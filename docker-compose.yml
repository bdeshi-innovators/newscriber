name: voicescribe
networks:
  default:
    name: voicescribe-net
services:
  db:
    image: postgres:15-alpine
    container_name: voicescribe-db
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-voicescribe}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-voicescribe}
      POSTGRES_DB: ${POSTGRES_DB:-voicescribe}
    volumes:
    - ./_data/postgres:/var/lib/postgresql/data
    healthcheck:
      test:
      - CMD-SHELL
      - pg_isready -U ${POSTGRES_USER:-voicescribe} -d ${POSTGRES_DB:-voicescribe}
      interval: 5s
      timeout: 3s
      retries: 10
  webhook-app:
    build: .
    image: voicescribe-webhook:${IMAGE_TAG:-latest}
    container_name: voicescribe-webhook
    ports:
      - "18080:8080"
    restart: unless-stopped
    env_file:
    - path: .env
      required: false
    environment:
      DATABASE_URL: postgres://${POSTGRES_USER:-voicescribe}:${POSTGRES_PASSWORD:-voicescribe}@db:5432/${POSTGRES_DB:-voicescribe}?sslmode=disable
      PORT: '8080'
      LOG_LEVEL: ${LOG_LEVEL:-info}
      LOG_FORMAT: ${LOG_FORMAT:-json}
      TWILIO_ACCOUNT_SID: ${TWILIO_ACCOUNT_SID:-}
      TWILIO_AUTH_TOKEN: ${TWILIO_AUTH_TOKEN:-}
      TWILIO_WHATSAPP_NUMBER: ${TWILIO_WHATSAPP_NUMBER:-}
      META_WHATSAPP_NUMBER: ${META_WHATSAPP_NUMBER:-}
    depends_on:
      db:
        condition: service_healthy
    healthcheck:
      test:
      - CMD
      - /app/webhook
      - -healthcheck
      interval: 10s
      timeout: 3s
      retries: 3
      start_period: 5s
    read_only: true
    security_opt:
    - no-new-privileges:true
    cap_drop:
    - ALL
  n8n:
    image: n8nio/n8n
    container_name: voicescribe-n8n
    ports:
      - "${N8N_HOST_PORT:-15678}:5678"
    restart: unless-stopped
    user: 1000:1000
    env_file:
    - path: .env
      required: false
    environment:
      N8N_HOST: ${N8N_HOST:-localhost}
      N8N_PORT: 5678
      N8N_PROTOCOL: ${N8N_PROTOCOL:-http}
      WEBHOOK_URL: ${N8N_WEBHOOK_URL:-http://localhost:15678/}
      GENERIC_TIMEZONE: ${TZ:-UTC}
      N8N_BLOCK_ENV_ACCESS_IN_NODE: 'false'
      NODE_FUNCTION_ALLOW_BUILTIN: crypto
    entrypoint: /scripts/n8n-init.sh
    volumes:
    - ./_data/n8n:/home/node/.n8n
    - ./n8n/workflows:/workflows:ro
    - ./scripts:/scripts:ro
  caddy:
    image: caddy:latest
    container_name: voicescribe-proxy
    restart: unless-stopped
    ports:
    - 80:80
    - 443:443
    - "443:443/udp"
    environment:
      STORAGE_UPSTREAM: ${STORAGE_UPSTREAM}
      STORAGE_HOST: ${STORAGE_HOST}
    volumes:
    - ./Caddyfile:/etc/caddy/Caddyfile
    - caddy_data:/data
    - caddy_config:/config
    depends_on:
    - n8n
    - webhook-app
  minio:
    image: minio/minio
    container_name: voicescribe-minio
    profiles:
      - local
    restart: unless-stopped
    environment:
      MINIO_ROOT_USER: admin
      MINIO_ROOT_PASSWORD: password
    volumes:
    - minio_data:/data
    command: server /data --console-address ":9001"
    ports:
    - 9000:9000
    - 9001:9001
volumes:
  caddy_data: null
  caddy_config: null
  minio_data: null
